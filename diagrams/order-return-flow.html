<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReturnFlow — Order Return Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0d1b2a; --bg2:#12202f; --white:#f1f5f9;
    --slate:#64748b; --slate-lt:#94a3b8;
    --blue:#3b82f6; --blue-lt:#93c5fd;
    --green-lt:#22c55e; --amber:#f59e0b; --amber-lt:#fcd34d;
    --purple:#a855f7; --purple-lt:#d8b4fe;
    --red:#ef4444; --red-lt:#fca5a5;
  }
  body { background:var(--bg); color:var(--white); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; padding:48px 24px 80px; }
  .header { max-width:960px; margin:0 auto 48px; }
  .header-label { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600; letter-spacing:0.2em; color:var(--slate); text-transform:uppercase; margin-bottom:10px; }
  .header h1 { font-size:30px; font-weight:300; color:var(--white); letter-spacing:-0.02em; }
  .header h1 span { font-weight:700; color:#bfe636; }
  .header-sub { font-size:13px; color:var(--slate-lt); margin-top:6px; }
  .canvas { max-width:960px; margin:0 auto; background:var(--bg2); border:1px solid #1e2d3d; border-radius:16px; padding:56px 32px 64px; position:relative; overflow:hidden; }
  .canvas::before { content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px); background-size:28px 28px; pointer-events:none; }
  .flow-svg { width:100%; display:block; overflow:visible; }
  .legend { max-width:960px; margin:24px auto 0; display:flex; flex-wrap:wrap; gap:18px; }
  .li { display:flex; align-items:center; gap:7px; font-size:10px; color:var(--slate); font-family:'IBM Plex Mono',monospace; }
  .ld { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">ReturnFlow · ServiceNow Capstone · 2026</div>
  <h1>Order <span>Return Request</span> Flow</h1>
  <p class="header-sub">End-to-end customer journey — from submission to close</p>
</div>

<div class="canvas">
<svg class="flow-svg" viewBox="0 0 860 1260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#475569"/></marker>
    <marker id="ahb" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3b82f6"/></marker>
    <marker id="ahg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#22c55e"/></marker>
    <marker id="ahr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
    <marker id="aha" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f59e0b"/></marker>
    <marker id="ahp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a855f7"/></marker>
  </defs>

  <!-- START -->
  <rect x="375" y="16" width="90" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="420" y="36" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" font-weight="600" fill="#94a3b8">START</text>
  <line x1="420" y1="48" x2="420" y2="78" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ahb)"/>

  <!-- Diamond 1: Order Exists? -->
  <polygon points="420,78 464,116 420,154 376,116" fill="#081828" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="420" y="112" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#93c5fd">Order</text>
  <text x="420" y="124" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#93c5fd">Exists?</text>

  <!-- D1 NO → left error -->
  <line x1="376" y1="116" x2="190" y2="116" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="190" y1="116" x2="190" y2="170" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ahr)"/>
  <text x="278" y="110" font-family="IBM Plex Mono" font-size="8.5" font-weight="700" fill="#fca5a5" text-anchor="middle">NO</text>
  <rect x="130" y="170" width="120" height="44" rx="6" fill="#1c0f0f" stroke="#ef4444" stroke-width="1.5"/>
  <text x="190" y="190" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#fca5a5">Order</text>
  <text x="190" y="204" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#fca5a5">Not Found</text>

  <!-- D1 YES → right → Diamond 2 -->
  <line x1="464" y1="116" x2="570" y2="116" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="570" y1="116" x2="570" y2="150" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ahb)"/>
  <text x="512" y="110" font-family="IBM Plex Mono" font-size="8.5" font-weight="700" fill="#93c5fd" text-anchor="middle">YES</text>

  <!-- Diamond 2: Within 14 Days? -->
  <polygon points="570,150 614,188 570,226 526,188" fill="#081828" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="570" y="184" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#93c5fd">Within</text>
  <text x="570" y="196" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#93c5fd">14 Days?</text>

  <!-- D2 NO → right error -->
  <line x1="614" y1="188" x2="720" y2="188" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="720" y1="188" x2="720" y2="242" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ahr)"/>
  <text x="664" y="182" font-family="IBM Plex Mono" font-size="8.5" font-weight="700" fill="#fca5a5" text-anchor="middle">NO</text>
  <rect x="656" y="242" width="130" height="44" rx="6" fill="#1c0f0f" stroke="#ef4444" stroke-width="1.5"/>
  <text x="721" y="262" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#fca5a5">Outside</text>
  <text x="721" y="276" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#fca5a5">Return Window</text>

  <!-- D2 YES → down -->
  <line x1="570" y1="226" x2="570" y2="258" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ahb)"/>
  <text x="582" y="246" font-family="IBM Plex Mono" font-size="8.5" font-weight="700" fill="#93c5fd">YES</text>

  <!-- Create Return Record -->
  <rect x="510" y="258" width="120" height="44" rx="6" fill="#0e1f3a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="570" y="278" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#93c5fd">Create Return</text>
  <text x="570" y="292" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#93c5fd">Record</text>

  <line x1="570" y1="302" x2="570" y2="326" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ahb)"/>

  <!-- Return Submitted -->
  <rect x="510" y="326" width="120" height="36" rx="6" fill="#0e1f3a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="570" y="349" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#93c5fd">Return Submitted</text>

  <line x1="570" y1="362" x2="570" y2="386" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aha)"/>

  <!-- Email: Drop Off -->
  <rect x="504" y="386" width="132" height="50" rx="6" fill="#281d0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="570" y="406" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#fcd34d">✉ Email: Drop Off</text>
  <text x="570" y="420" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#fcd34d">Item + Ref No.</text>
  <text x="570" y="432" text-anchor="middle" font-family="IBM Plex Mono" font-size="7.5" fill="#f59e0b">Requester + Fulfiller notified</text>

  <line x1="570" y1="436" x2="570" y2="460" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Warehouse Task -->
  <rect x="504" y="460" width="132" height="56" rx="6" fill="#0d2018" stroke="#22c55e" stroke-width="1.5"/>
  <text x="570" y="480" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#86efac">Warehouse Task</text>
  <text x="570" y="494" text-anchor="middle" font-family="IBM Plex Mono" font-size="8.5" fill="#86efac">────────────</text>
  <text x="570" y="508" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#86efac">Inspect Item</text>

  <line x1="570" y1="516" x2="570" y2="542" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Decision diamond -->
  <polygon points="570,542 608,576 570,610 532,576" fill="#131e2e" stroke="#334155" stroke-width="1.5"/>
  <text x="570" y="572" text-anchor="middle" font-family="IBM Plex Mono" font-size="8.5" font-weight="600" fill="#94a3b8">Decision</text>
  <text x="570" y="584" text-anchor="middle" font-family="IBM Plex Mono" font-size="8" fill="#94a3b8">?</text>

  <!-- REJECTED → left -->
  <line x1="532" y1="576" x2="350" y2="576" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="350" y1="576" x2="350" y2="620" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ahr)"/>
  <text x="436" y="570" font-family="IBM Plex Mono" font-size="8.5" font-weight="700" fill="#fca5a5" text-anchor="middle">REJECTED</text>

  <!-- APPROVED → right -->
  <line x1="608" y1="576" x2="720" y2="576" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="720" y1="576" x2="720" y2="620" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ahg)"/>
  <text x="661" y="570" font-family="IBM Plex Mono" font-size="8.5" font-weight="700" fill="#86efac" text-anchor="middle">APPROVED</text>

  <!-- ── REJECTED BRANCH ── -->

  <!-- Look Up Task -->
  <rect x="284" y="620" width="132" height="44" rx="6" fill="#0e1f3a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="350" y="638" text-anchor="middle" font-family="IBM Plex Mono" font-size="8.5" font-weight="600" fill="#93c5fd">Look Up Task</text>
  <text x="350" y="652" text-anchor="middle" font-family="IBM Plex Mono" font-size="8" fill="#93c5fd">Get Rejection Reason</text>

  <line x1="350" y1="664" x2="350" y2="688" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ahr)"/>

  <!-- Update: Return Rejected -->
  <rect x="284" y="688" width="132" height="36" rx="6" fill="#1c0f0f" stroke="#ef4444" stroke-width="1.5"/>
  <text x="350" y="706" text-anchor="middle" font-family="IBM Plex Mono" font-size="8.5" font-weight="600" fill="#fca5a5">Update: Return</text>
  <text x="350" y="720" text-anchor="middle" font-family="IBM Plex Mono" font-size="8.5" font-weight="600" fill="#fca5a5">Rejected</text>

  <line x1="350" y1="724" x2="350" y2="748" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aha)"/>

  <!-- Email: Rejected -->
  <rect x="278" y="748" width="144" height="52" rx="6" fill="#281d0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="350" y="768" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#fcd34d">✉ Email: Rejected</text>
  <text x="350" y="782" text-anchor="middle" font-family="IBM Plex Mono" font-size="8.5" fill="#fcd34d">Reason included</text>
  <text x="350" y="795" text-anchor="middle" font-family="IBM Plex Mono" font-size="7.5" fill="#f59e0b">Requester notified</text>

  <line x1="350" y1="800" x2="350" y2="824" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Wait 7 Days (rejected) -->
  <rect x="284" y="824" width="132" height="36" rx="6" fill="#141a28" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="350" y="842" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#94a3b8">Wait 7 Days</text>
  <text x="350" y="856" text-anchor="middle" font-family="IBM Plex Mono" font-size="7.5" fill="#64748b">before closing record</text>

  <line x1="350" y1="860" x2="350" y2="884" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ahr)"/>

  <!-- Closed Rejected -->
  <rect x="284" y="884" width="132" height="36" rx="6" fill="#1c0f0f" stroke="#ef4444" stroke-width="1.5"/>
  <text x="350" y="902" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#fca5a5">Closed Rejected</text>

  <!-- ── APPROVED BRANCH ── -->

  <!-- Email: Return Approved -->
  <rect x="654" y="620" width="132" height="52" rx="6" fill="#281d0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="720" y="640" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#fcd34d">✉ Email: Received</text>
  <text x="720" y="654" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#fcd34d">Return Approved</text>
  <text x="720" y="667" text-anchor="middle" font-family="IBM Plex Mono" font-size="7.5" fill="#f59e0b">Requester notified</text>

  <line x1="720" y1="672" x2="720" y2="696" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ahg)"/>

  <!-- Update: Return Approved -->
  <rect x="654" y="696" width="132" height="36" rx="6" fill="#0d2018" stroke="#22c55e" stroke-width="1.5"/>
  <text x="720" y="716" text-anchor="middle" font-family="IBM Plex Mono" font-size="8.5" font-weight="600" fill="#86efac">Update: Return</text>
  <text x="720" y="730" text-anchor="middle" font-family="IBM Plex Mono" font-size="8.5" font-weight="600" fill="#86efac">Approved</text>

  <line x1="720" y1="732" x2="720" y2="756" stroke="#a855f7" stroke-width="1.5" marker-end="url(#ahp)"/>

  <!-- Finance Task -->
  <rect x="654" y="756" width="132" height="56" rx="6" fill="#1c1030" stroke="#a855f7" stroke-width="1.5"/>
  <text x="720" y="776" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#d8b4fe">Finance Task</text>
  <text x="720" y="790" text-anchor="middle" font-family="IBM Plex Mono" font-size="8.5" fill="#d8b4fe">────────────</text>
  <text x="720" y="804" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#d8b4fe">Process Refund</text>

  <line x1="720" y1="812" x2="720" y2="836" stroke="#a855f7" stroke-width="1.5" marker-end="url(#ahp)"/>

  <!-- Update: Refund Processed -->
  <rect x="654" y="836" width="132" height="36" rx="6" fill="#1c1030" stroke="#a855f7" stroke-width="1.5"/>
  <text x="720" y="854" text-anchor="middle" font-family="IBM Plex Mono" font-size="8.5" font-weight="600" fill="#d8b4fe">Update: Refund</text>
  <text x="720" y="868" text-anchor="middle" font-family="IBM Plex Mono" font-size="8.5" font-weight="600" fill="#d8b4fe">Processed</text>

  <line x1="720" y1="872" x2="720" y2="896" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Wait 7 Days (approved) -->
  <rect x="654" y="896" width="132" height="36" rx="6" fill="#141a28" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="720" y="914" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#94a3b8">Wait 7 Days</text>
  <text x="720" y="928" text-anchor="middle" font-family="IBM Plex Mono" font-size="7.5" fill="#64748b">before closing record</text>

  <line x1="720" y1="932" x2="720" y2="956" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ahg)"/>

  <!-- Closed Approved -->
  <rect x="654" y="956" width="132" height="36" rx="6" fill="#0d2018" stroke="#22c55e" stroke-width="1.5"/>
  <text x="720" y="976" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" font-weight="600" fill="#86efac">Closed Approved</text>

  <!-- END -->
  <line x1="720" y1="992" x2="720" y2="1016" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ahg)"/>
  <rect x="675" y="1016" width="90" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="720" y="1037" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" font-weight="600" fill="#94a3b8">END</text>

</svg>
</div>

<div class="legend">
  <div class="li"><div class="ld" style="background:#3b82f6"></div>System / Flow</div>
  <div class="li"><div class="ld" style="background:#22c55e"></div>Warehouse / Approved</div>
  <div class="li"><div class="ld" style="background:#a855f7"></div>Finance</div>
  <div class="li"><div class="ld" style="background:#f59e0b"></div>Email Notification</div>
  <div class="li"><div class="ld" style="background:#ef4444"></div>Rejection / Error</div>
  <div class="li">
    <div style="width:20px;height:0;border-top:1.5px dashed #64748b;margin-top:1px;flex-shrink:0;"></div>
    Wait 7 Days
  </div>
</div>

</body>
</html>
